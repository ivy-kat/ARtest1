<!DOCTYPE html>
<html lang="ja">
    <head>
        <!--meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" -->
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <!-- we import arjs version without NFT but with marker + location based support -->
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: sans-serif;
            }

            #saveButton {
                position: fixed;
                left: 16px;
                bottom: calc(16px + env(safe-area-inset-bottom, 0px));
                z-index: 20;
                display: none;
                padding: 12px 18px;
                border: 0;
                border-radius: 999px;
                background: rgba(0, 0, 0, 0.75);
                color: #fff;
                font-size: 16px;
                font-weight: 700;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            }

            #saveMessage {
                position: fixed;
                left: 16px;
                right: 16px;
                bottom: calc(72px + env(safe-area-inset-bottom, 0px));
                z-index: 20;
                display: none;
                padding: 10px 12px;
                border-radius: 12px;
                background: rgba(0, 0, 0, 0.75);
                color: #fff;
                font-size: 14px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <button id="saveButton" type="button">保存</button>
        <div id="saveMessage" aria-live="polite"></div>

        <a-scene embedded arjs renderer="alpha: true; preserveDrawingBuffer: true; logarithmicDepthBuffer: true; colorManagement: true;">
            <a-marker type="pattern" url="../pattern-marker.patt">
                <a-entity
                    position="0 -1 0"
                    scale="1 1 1"
                    gltf-model="https://ivy-kat.github.io/ARtest1/AMNGS.glb"
                ></a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>

        <script>
            (function () {
                var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                var saveButton = document.getElementById('saveButton');
                var saveMessage = document.getElementById('saveMessage');
                var scene = document.querySelector('a-scene');

                function getActiveVideo() {
                    var videos = document.querySelectorAll('video');
                    for (var i = 0; i < videos.length; i += 1) {
                        var video = videos[i];
                        if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
                            return video;
                        }
                    }
                    return null;
                }

                function downloadBlob(blob) {
                    var fileName = 'ar-capture-' + Date.now() + '.png';
                    var blobUrl = URL.createObjectURL(blob);
                    var link = document.createElement('a');

                    link.href = blobUrl;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();

                    window.setTimeout(function () {
                        URL.revokeObjectURL(blobUrl);
                    }, 1000);
                }

                function showMessage(message) {
                    saveMessage.textContent = message;
                    saveMessage.style.display = 'block';
                    window.clearTimeout(showMessage.timerId);
                    showMessage.timerId = window.setTimeout(function () {
                        saveMessage.style.display = 'none';
                    }, 2500);
                }

                if (!isMobile) {
                    return;
                }

                saveButton.style.display = 'block';

                saveButton.addEventListener('click', function () {
                    if (!scene || !scene.renderer || !scene.camera) {
                        showMessage('保存の準備がまだ完了していません');
                        return;
                    }

                    try {
                        // AR.jsが生成したカメラvideo要素を取得
                        var video = getActiveVideo();
                        if (!video) {
                            showMessage('カメラ映像の準備がまだ完了していません');
                            return;
                        }

                        // WebGLキャンバスを取得（3Dモデル描画レイヤー）
                        var glCanvas = scene.renderer.domElement;
                        if (!glCanvas || glCanvas.width === 0 || glCanvas.height === 0) {
                            showMessage('3D描画の準備がまだ完了していません');
                            return;
                        }

                        var w = glCanvas.width;
                        var h = glCanvas.height;

                        // 合成用の2Dキャンバス
                        var composite = document.createElement('canvas');
                        composite.width = w;
                        composite.height = h;
                        var ctx = composite.getContext('2d');
                        if (!ctx) {
                            showMessage('画像の保存に失敗しました');
                            return;
                        }

                        // 1) カメラ映像を背景に描画（表示と同じcover挙動に合わせる）
                        var vw = video.videoWidth;
                        var vh = video.videoHeight;
                        var scale = Math.max(w / vw, h / vh);
                        var drawW = vw * scale;
                        var drawH = vh * scale;
                        var dx = (w - drawW) / 2;
                        var dy = (h - drawH) / 2;
                        ctx.drawImage(video, dx, dy, drawW, drawH);

                        // 2) 3Dモデルレイヤーを上から重ねる
                        // 保存直前に1フレーム描画し、最新状態を確実に取得する
                        scene.renderer.render(scene.object3D, scene.camera);
                        ctx.drawImage(glCanvas, 0, 0, w, h);

                        // 3) 合成結果を保存
                        composite.toBlob(function (blob) {
                            if (!blob) {
                                showMessage('画像の保存に失敗しました');
                                return;
                            }

                            downloadBlob(blob);
                            showMessage('画像を保存しました');
                        }, 'image/png');
                    } catch (error) {
                        showMessage('画像の保存に失敗しました');
                    }
                });
            }());
        </script>
    </body>
</html>
